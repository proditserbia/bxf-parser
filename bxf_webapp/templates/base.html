<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}BXF AsRun{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<nav class="navbar">
  <a class="brand" href="{{ url_for('main.index') }}">BXF AsRun</a>
  <div class="nav-links">
    {% if session.get('username') %}
      <a href="{{ url_for('main.search') }}">Search</a>
      <a href="{{ url_for('main.upload') }}">Upload</a>
      <a href="{{ url_for('main.ingest_log') }}">Ingest Log</a>
      <span class="nav-user">{{ session['username'] }}</span>
      <a href="{{ url_for('auth.logout') }}" class="btn-logout">Log out</a>
    {% endif %}
  </div>
</nav>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash flash-{{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>
</body>
</html>
